<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Неравенства и системы | Решаем сами | 8–9 класс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(145deg, #1e2f3a 0%, #0f1e2a 100%);
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-wrapper {
            max-width: 950px;
            width: 100%;
            margin: 0 auto;
        }

        .quiz-card {
            background: rgba(25, 35, 50, 0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }

        .quiz-header {
            background: linear-gradient(135deg, #2c5a6e, #1a3f4f);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 3px solid #ffaa44;
        }

        .title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .title p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 0.2rem;
        }

        .score-box {
            background: #ffaa44;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            color: #1a2a3a;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .quiz-body {
            padding: 2rem 2rem 1.8rem;
        }

        .question-card {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
            border-left: 5px solid #ffaa44;
            padding-left: 1rem;
        }

        .task-math {
            font-family: monospace;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.8rem;
            border-radius: 1rem;
            margin: 0.5rem 0 1rem 0;
        }

        .input-group {
            margin: 1rem 0;
        }

        .input-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .glass-input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-family: monospace;
        }

        .glass-input:focus {
            outline: none;
            border-color: #ffaa44;
        }

        .action-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 0.6rem 1.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: rgba(255, 170, 68, 0.2);
            border-color: #ffaa44;
            color: #ffdd99;
        }

        .hint-btn {
            background: rgba(100, 150, 200, 0.2);
            border-color: #6c8cff;
        }

        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid;
        }

        .feedback-correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
        }

        .feedback-wrong {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .hint-text {
            margin-top: 0.6rem;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            font-size: 0.9rem;
            display: none;
            border-left: 3px solid #6c8cff;
        }

        .hint-text.show {
            display: block;
        }

        .progress-info {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        hr {
            margin: 1rem 0;
            border-color: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 620px) {
            .question-text { font-size: 1.2rem; }
            .quiz-body { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <div class="title">
                <h1>📐 Неравенства и системы</h1>
                <p>Решаем сами · Вводим ответ промежутком или неравенством</p>
            </div>
            <div class="score-box" id="scoreDisplay">0 / 10</div>
        </div>
        <div class="quiz-body" id="quizBody">
            <!-- динамическая загрузка -->
        </div>
    </div>
</div>

<script>
    // =========== СПИСОК ЗАДАЧ (решаем сами) ===========
    const TASKS = [
        {
            text: "Решите неравенство: 3x - 7 > 5",
            answerVariants: ["x > 4", "(4; +∞)", "x>4", "4;+∞"],
            correctDisplay: "x > 4  или  (4; +∞)",
            hint: "1) Перенеси -7 в правую часть: 3x > 12. 2) Раздели обе части на 3. → x > 4"
        },
        {
            text: "Решите неравенство: -2x + 5 ≥ 11",
            answerVariants: ["x ≤ -3", "(-∞; -3]", "x<=-3", "-∞;-3"],
            correctDisplay: "x ≤ -3  или  (-∞; -3]",
            hint: "1) Перенеси 5: -2x ≥ 6. 2) Раздели на -2 (знак меняется): x ≤ -3"
        },
        {
            text: "Решите систему: { 2x - 1 < 5,  3 - x ≤ 0 }",
            answerVariants: ["[3; 3)", "x ≥ 3", "[3; +∞)", "3;+∞", "x>=3"],
            correctDisplay: "x ≥ 3  или  [3; +∞)",
            hint: "Первое: 2x < 6 → x < 3. Второе: -x ≤ -3 → x ≥ 3. Пересечение: x = 3? нет, x ≥ 3 и x<3 не пересекаются? Проверь знаки: второе 3 - x ≤ 0 → -x ≤ -3 → x ≥ 3. Пересечение x < 3 и x ≥ 3 — пусто? Нет, x≥3 не имеет общих с x<3. Ответ: решений нет. (но по условию ожидается x ≥ 3 — давай проверим: 3 - 0 ≤ 0 неверно. Подожди, ошибка!)"
        },
        {
            text: "Решите неравенство: 4(x - 2) ≤ 2x + 6",
            answerVariants: ["x ≤ 7", "(-∞; 7]", "x<=7", "-∞;7"],
            correctDisplay: "x ≤ 7  или  (-∞; 7]",
            hint: "Раскрой скобки: 4x - 8 ≤ 2x + 6 → 4x - 2x ≤ 6 + 8 → 2x ≤ 14 → x ≤ 7"
        },
        {
            text: "Решите систему: { x + 3 > 1,  2x - 5 < 7 }",
            answerVariants: ["(-2; 6)", "-2<x<6", "(-2;6)", "-2;6"],
            correctDisplay: "(-2; 6)",
            hint: "Первое: x > -2. Второе: 2x < 12 → x < 6. Пересечение: -2 < x < 6"
        },
        {
            text: "Решите неравенство: (x - 3)/2 ≥ 1",
            answerVariants: ["x ≥ 5", "[5; +∞)", "x>=5", "5;+∞"],
            correctDisplay: "x ≥ 5  или  [5; +∞)",
            hint: "Умножь на 2: x - 3 ≥ 2 → x ≥ 5"
        },
        {
            text: "Решите систему: { 5x + 2 > 7,  1 - x > 0 }",
            answerVariants: ["∅", "нет решений", "решений нет", "пустое множество"],
            correctDisplay: "∅ (нет решений)",
            hint: "Первое: 5x > 5 → x > 1. Второе: -x > -1 → x < 1. Нет общих чисел → решений нет."
        },
        {
            text: "Решите неравенство: -3x + 4 < 10 - x",
            answerVariants: ["x > -3", "(-3; +∞)", "x>-3", "-3;+∞"],
            correctDisplay: "x > -3  или  (-3; +∞)",
            hint: "Перенеси x: -3x + x < 10 - 4 → -2x < 6 → x > -3 (знак меняется)"
        },
        {
            text: "Решите систему: { 2x - 7 ≥ 3,  4 - x ≤ 2 }",
            answerVariants: ["x ≥ 5", "[5; +∞)", "x>=5", "5;+∞"],
            correctDisplay: "x ≥ 5  или  [5; +∞)",
            hint: "Первое: 2x ≥ 10 → x ≥ 5. Второе: -x ≤ -2 → x ≥ 2. Пересечение: x ≥ 5"
        },
        {
            text: "Решите двойное неравенство: -2 < 3x + 1 ≤ 7",
            answerVariants: ["(-1; 2]", "-1 < x ≤ 2", "(-1;2]", "-1;2"],
            correctDisplay: "(-1; 2]",
            hint: "Вычти 1: -3 < 3x ≤ 6 → раздели на 3: -1 < x ≤ 2"
        }
    ];

    // корректируем 3-ю задачу (там реально нет решений, но в ответе ожидаем ∅)
    TASKS[2] = {
        text: "Решите систему: { 2x - 1 < 5,  3 - x ≤ 0 }",
        answerVariants: ["∅", "нет решений", "решений нет", "пустое множество"],
        correctDisplay: "∅ (нет решений)",
        hint: "Первое: 2x < 6 → x < 3. Второе: -x ≤ -3 → x ≥ 3. Нет чисел, которые одновременно меньше 3 и больше или равны 3 → решений нет."
    };

    const TOTAL = TASKS.length;
    let currentIndex = 0;
    let solved = new Array(TOTAL).fill(false);
    let userAnswers = new Array(TOTAL).fill("");
    let checked = new Array(TOTAL).fill(false);

    const quizBody = document.getElementById("quizBody");
    const scoreSpan = document.getElementById("scoreDisplay");

    function normalizeAnswer(str, task) {
        let s = str.trim().toLowerCase().replace(/\s/g, '');
        // замена стандартных записей
        s = s.replace(/\(-/g, '(-');
        s = s.replace(/\+∞/g, '+∞');
        s = s.replace(/бесконечность/g, '∞');
        if (s === "нетрешений" || s === "решенийнет" || s === "пустое") return "∅";
        if (s === "∅") return "∅";
        return s;
    }

    function isAnswerCorrect(userRaw, task) {
        let normalized = normalizeAnswer(userRaw, task);
        for (let variant of task.answerVariants) {
            let varNorm = normalizeAnswer(variant, task);
            if (normalized === varNorm) return true;
            // для числовых промежутков без пробелов
            if (normalized === variant.toLowerCase().replace(/\s/g, '')) return true;
        }
        return false;
    }

    function updateScoreUI() {
        let correctCount = solved.filter(v => v === true).length;
        scoreSpan.innerText = `${correctCount} / ${TOTAL}`;
    }

    function checkAnswer() {
        const input = document.getElementById("answerInput");
        const userValue = input.value;
        const task = TASKS[currentIndex];
        const isCorrect = isAnswerCorrect(userValue, task);

        userAnswers[currentIndex] = userValue;
        checked[currentIndex] = true;
        if (isCorrect && !solved[currentIndex]) solved[currentIndex] = true;
        else if (!isCorrect) solved[currentIndex] = false;
        updateScoreUI();
        renderCurrentTask();
    }

    function renderCurrentTask() {
        const task = TASKS[currentIndex];
        const alreadyChecked = checked[currentIndex];
        const isCorrect = solved[currentIndex];
        const userValue = userAnswers[currentIndex] || "";

        let feedbackHtml = "";
        if (alreadyChecked) {
            feedbackHtml = `
                <div class="feedback ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                    ${isCorrect ? '✅ Верно!' : `❌ Неверно. Правильный ответ: ${task.correctDisplay}`}
                </div>
            `;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">📌 Задача ${currentIndex+1} из ${TOTAL}</div>
                <div class="task-math">${task.text}</div>
                
                <div class="input-group">
                    <div class="input-label">✏️ Ваш ответ (промежуток или неравенство):</div>
                    <input type="text" id="answerInput" class="glass-input" placeholder="например: x>4  или  (-2; 6]  или  ∅" value="${escapeHtml(userValue)}">
                </div>

                <div class="action-group">
                    <button id="checkBtn" class="btn-primary">🔍 Проверить</button>
                    <button id="nextBtn" class="">➡️ Следующая задача</button>
                    <button id="hintBtn" class="hint-btn">📖 Открыть фрагмент решения</button>
                </div>

                <div id="hintContainer" class="hint-text">${task.hint}</div>
                ${feedbackHtml}
                <div class="progress-info">✅ Верно решено: ${solved.filter(v=>v===true).length} из ${TOTAL}</div>
            </div>
        `;

        quizBody.innerHTML = html;

        const checkBtn = document.getElementById("checkBtn");
        const nextBtn = document.getElementById("nextBtn");
        const hintBtn = document.getElementById("hintBtn");
        const hintDiv = document.getElementById("hintContainer");

        if (checkBtn) checkBtn.addEventListener("click", checkAnswer);
        if (nextBtn) {
            nextBtn.addEventListener("click", () => {
                if (currentIndex + 1 < TOTAL) {
                    currentIndex++;
                    renderCurrentTask();
                } else {
                    finishQuiz();
                }
            });
        }
        if (hintBtn && hintDiv) {
            hintBtn.addEventListener("click", () => {
                hintDiv.classList.toggle("show");
                hintBtn.textContent = hintDiv.classList.contains("show") ? "🔒 Закрыть фрагмент" : "📖 Открыть фрагмент";
            });
        }
    }

    function finishQuiz() {
        const correctTotal = solved.filter(v => v === true).length;
        const percent = Math.round(correctTotal / TOTAL * 100);
        let gradeMsg = "";
        if (percent >= 80) gradeMsg = "🎉 Отлично! Ты отлично решаешь неравенства!";
        else if (percent >= 60) gradeMsg = "👍 Хорошо! Повтори правила переноса и смены знака.";
        else gradeMsg = "📚 Попробуй ещё раз. Внимательно смотри подсказки.";

        let listHtml = `<div style="font-size:1.4rem; font-weight:700; margin-bottom:1rem;">📊 Результат</div>`;
        listHtml += `<div style="background:rgba(0,0,0,0.3); border-radius:1rem; padding:1rem; text-align:center; margin-bottom:1rem;">
                        <span style="font-size:1.6rem; font-weight:800;">${correctTotal} / ${TOTAL}</span><br>${percent}% — ${gradeMsg}
                     </div>`;
        for (let i = 0; i < TOTAL; i++) {
            const t = TASKS[i];
            const isUserCorrect = solved[i];
            const userAns = userAnswers[i] || "—";
            listHtml += `
                <div style="background:rgba(0,0,0,0.2); border-radius:1rem; padding:0.8rem; margin-bottom:0.8rem;">
                    <strong>${i+1}. ${t.text}</strong><br>
                    <span style="color:${isUserCorrect ? '#4ade80' : '#ff6b6b'}">${isUserCorrect ? '✅ Верно' : '❌ Ошибка'}</span><br>
                    <span>📖 Правильный ответ: ${t.correctDisplay}</span><br>
                    ${!isUserCorrect ? `<span>✏️ Ваш ответ: ${escapeHtml(userAns)}</span><br>` : ''}
                </div>
            `;
        }
        listHtml += `<div style="display:flex; justify-content:center; margin-top:1rem;"><button id="restartBtn" class="">🔄 Пройти заново</button></div>`;
        quizBody.innerHTML = listHtml;
        document.getElementById("restartBtn")?.addEventListener("click", () => {
            currentIndex = 0;
            solved = new Array(TOTAL).fill(false);
            userAnswers = new Array(TOTAL).fill("");
            checked = new Array(TOTAL).fill(false);
            renderCurrentTask();
            updateScoreUI();
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderCurrentTask();
    updateScoreUI();
</script>
</body>
</html>
